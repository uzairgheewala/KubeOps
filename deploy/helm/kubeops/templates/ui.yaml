apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeops.fullname" . }}-ui
  labels: {{- include "kubeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports: [{ name: http, containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 15 }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] }, readOnlyRootFilesystem: true }
          resources: {{ toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts: [{ name: cache, mountPath: /var/cache/nginx }, { name: run, mountPath: /var/run }]
      volumes: [{ name: cache, emptyDir: {} }, { name: run, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeops.fullname" . }}-ui
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ui
  ports: [{ name: http, port: {{ .Values.ui.service.port }}, targetPort: http }]
