{{- if .Values.executor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeops.fullname" . }}-executor
  labels: {{- include "kubeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  replicas: {{ .Values.executor.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: executor
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: executor
    spec:
      serviceAccountName: {{ include "kubeops.serviceAccountName" . }}
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: executor
          image: "{{ .Values.executor.image.repository }}:{{ .Values.executor.image.tag }}"
          imagePullPolicy: {{ .Values.executor.image.pullPolicy }}
          command: ["python", "control_plane/manage.py", "run_executor_agent"]
          args: ["--agent-id", {{ .Values.executor.agentId | quote }}, "--capabilities", {{ .Values.executor.capabilities | quote }}, "--executors", {{ .Values.executor.executorIds | quote }}, "--max-concurrency", {{ .Values.executor.maxConcurrency | quote }}]
          envFrom: [{ configMapRef: { name: {{ include "kubeops.fullname" . }}-config } }]
          env:
            - { name: DJANGO_SECRET_KEY, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.djangoSecretKeyKey }} } } }
            - { name: DATABASE_URL, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.databaseUrlKey }} } } }
            - { name: KUBEOPS_PACK_TRUST_PUBLIC_KEY, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.packTrustPublicKeyKey }}, optional: true } } }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] }, readOnlyRootFilesystem: true }
          resources: {{ toYaml .Values.executor.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: operations, mountPath: /workspace/operations }
      volumes:
        - { name: tmp, emptyDir: {} }
        - name: operations
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim: { claimName: {{ include "kubeops.fullname" . }}-operations }
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
