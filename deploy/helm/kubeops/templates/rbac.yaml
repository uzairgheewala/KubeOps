{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeops.fullname" . }}-observer
  labels: {{- include "kubeops.labels" . | nindent 4 }}
rules:
{{ toYaml .Values.rbac.rules | indent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeops.fullname" . }}-observer
  labels: {{- include "kubeops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeops.fullname" . }}-observer
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeops.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
