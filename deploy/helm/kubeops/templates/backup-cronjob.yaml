{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kubeops.fullname" . }}-platform-backup
  labels: {{- include "kubeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: {{ .Values.backup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: platform-backup
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "kubeops.serviceAccountName" . }}
          securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
          containers:
            - name: backup
              image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
              imagePullPolicy: {{ .Values.api.image.pullPolicy }}
              command: ["python", "control_plane/manage.py", "create_platform_backup"]
              {{- if .Values.backup.externalArtifactBackupVerified }}
              args: ["--external-artifact-backup-verified"]
              {{- end }}
              envFrom: [{ configMapRef: { name: {{ include "kubeops.fullname" . }}-config } }]
              env:
                - { name: DJANGO_SECRET_KEY, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.djangoSecretKeyKey }} } } }
                - { name: DATABASE_URL, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.databaseUrlKey }} } } }
                - { name: KUBEOPS_PACK_TRUST_PUBLIC_KEY, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.packTrustPublicKeyKey }}, optional: true } } }
                - { name: KUBEOPS_PACK_TRUST_SECRET, valueFrom: { secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: {{ .Values.secrets.packTrustSecretKey }}, optional: true } } }
              securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] }, readOnlyRootFilesystem: true }
              resources: {{ toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - { name: artifacts, mountPath: /workspace/artifacts, readOnly: true }
                - { name: backups, mountPath: /workspace/backups }
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: artifacts
              {{- if .Values.persistence.enabled }}
              persistentVolumeClaim: { claimName: {{ include "kubeops.fullname" . }}-artifacts }
              {{- else }}
              emptyDir: {}
              {{- end }}
            - name: backups
              {{- if .Values.persistence.enabled }}
              persistentVolumeClaim: { claimName: {{ include "kubeops.fullname" . }}-backups }
              {{- else }}
              emptyDir: {}
              {{- end }}
            - { name: tmp, emptyDir: {} }
{{- end }}
