name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kubeops
          POSTGRES_USER: kubeops
          POSTGRES_PASSWORD: kubeops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kubeops -d kubeops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PYTHONPATH: packages/kubeops_core:packages/kubeops_pack_sdk:packages/kubeops_cli:control_plane
      DATABASE_URL: postgresql://kubeops:kubeops@localhost:5432/kubeops
      KUBEOPS_SCENARIO_DIR: ${{ github.workspace }}/scenarios
      KUBEOPS_PROFILE_DIR: ${{ github.workspace }}/profiles
      KUBEOPS_ARTIFACT_DIR: ${{ github.workspace }}/artifacts
      KUBEOPS_LIFECYCLE_DIR: ${{ github.workspace }}/lifecycle
      KUBEOPS_POLICY_DIR: ${{ github.workspace }}/policies
      KUBEOPS_OPERATION_DIR: ${{ github.workspace }}/operations
      KUBEOPS_PACK_DIR: ${{ github.workspace }}/packs
      KUBEOPS_LIVE_EXECUTION_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python control_plane/manage.py migrate
      - run: python control_plane/manage.py seed_release_01
      - run: python control_plane/manage.py seed_release_02
      - run: python control_plane/manage.py seed_release_04
      - run: python control_plane/manage.py seed_release_05
      - run: ruff check packages control_plane tests
      - run: pytest --cov --cov-report=term-missing

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: ui
        run: npm install
      - working-directory: ui
        run: npm run build
