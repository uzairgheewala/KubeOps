services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kubeops
      POSTGRES_USER: kubeops
      POSTGRES_PASSWORD: kubeops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubeops -d kubeops"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - kubeops-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    environment:
      DJANGO_SECRET_KEY: development-only-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgresql://kubeops:kubeops@postgres:5432/kubeops
      KUBEOPS_SCENARIO_DIR: /workspace/scenarios
      KUBEOPS_PROFILE_DIR: /workspace/profiles
      KUBEOPS_ARTIFACT_DIR: /workspace/artifacts
      KUBEOPS_LIFECYCLE_DIR: /workspace/lifecycle
      KUBEOPS_POLICY_DIR: /workspace/policies
      KUBEOPS_OPERATION_DIR: /workspace/operations
      KUBEOPS_PACK_DIR: /workspace/packs
      KUBEOPS_LIVE_EXECUTION_ENABLED: "0"
    command: >-
      sh -c "python control_plane/manage.py migrate &&
             python control_plane/manage.py seed_release_01 &&
             python control_plane/manage.py seed_release_02 &&
             python control_plane/manage.py seed_release_04 &&
             python control_plane/manage.py seed_release_05 &&
             python control_plane/manage.py seed_release_10 &&
             python control_plane/manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts:/workspace/artifacts
      - ./operations:/workspace/operations

  executor:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    environment:
      DJANGO_SECRET_KEY: development-only-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgresql://kubeops:kubeops@postgres:5432/kubeops
      KUBEOPS_ARTIFACT_DIR: /workspace/artifacts
      KUBEOPS_OPERATION_DIR: /workspace/operations
      KUBEOPS_LIVE_EXECUTION_ENABLED: "0"
      KUBEOPS_EXECUTOR_AGENT_ID: compose-executor
      KUBEOPS_EXECUTOR_AGENT_NAME: Compose dry-run executor
      KUBEOPS_EXECUTOR_CAPABILITIES: executor.claim,executor.complete,observe,simulation,fixture
      KUBEOPS_EXECUTOR_IDS: dry_run,simulation,builtin.wait
      KUBEOPS_EXECUTOR_MAX_CONCURRENCY: "2"
    command: python control_plane/manage.py run_executor_agent
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./artifacts:/workspace/artifacts
      - ./operations:/workspace/operations
    profiles: ["executor"]

  scheduler:
    build:
      context: .
      dockerfile: control_plane/Dockerfile
    environment:
      DJANGO_SECRET_KEY: development-only-change-me
      DJANGO_DEBUG: "1"
      DATABASE_URL: postgresql://kubeops:kubeops@postgres:5432/kubeops
      KUBEOPS_ARTIFACT_DIR: /workspace/artifacts
      KUBEOPS_OPERATION_DIR: /workspace/operations
      KUBEOPS_LIVE_EXECUTION_ENABLED: "0"
    command: python control_plane/manage.py run_operation_scheduler --poll-seconds 15
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./artifacts:/workspace/artifacts
      - ./operations:/workspace/operations
    profiles: ["scheduler"]

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: development
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  kubeops-postgres:
