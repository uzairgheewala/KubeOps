schema_version: kubeops.io/v1
environment_id: demo-kind-fixture
name: Demo Kind fixture
environment_class: development
provider: fixture
cluster_provider: kind
host_provider: docker
criticality: disposable-control-plane
access_methods:
  - schema_version: kubeops.io/v1
    method_id: recorded-degraded
    method_type: fixture
    title: Recorded degraded Kind environment
    fixture_path: lab/fixtures/kind-demo-degraded.v1.yaml
    read_only: true
    timeout_seconds: 30
  - schema_version: kubeops.io/v1
    method_id: recorded-healthy
    method_type: fixture
    title: Recorded healthy Kind environment
    fixture_path: lab/fixtures/kind-demo-healthy.v1.yaml
    read_only: true
    timeout_seconds: 30
default_access_method_id: recorded-degraded
operational_profile_ids:
  - cluster-observable.v1
  - local-development-usable.v1
installed_pack_ids:
  - generic-kubernetes
  - kind
labels:
  purpose: release-0.2-demo
annotations:
  description: Replays sanitized read-only fixtures without requiring a live cluster.
