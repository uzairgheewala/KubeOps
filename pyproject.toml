[tool.ruff]
target-version = "py311"
line-length = 100
src = ["packages/kubeops_core", "packages/kubeops_cli", "control_plane"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
plugins = ["pydantic.mypy"]
mypy_path = ["packages/kubeops_core", "packages/kubeops_cli", "control_plane"]
exclude = ["control_plane/api/migrations"]

[tool.coverage.run]
branch = true
source = ["kubeops_core", "kubeops_cli", "api"]

[tool.coverage.report]
show_missing = true
skip_covered = true
