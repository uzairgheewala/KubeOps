[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kubeops-cli"
version = "1.0.0"
description = "CLI for KubeOps Release 1.0"
requires-python = ">=3.11"
dependencies = [
  "kubeops-core>=1.0.0,<2",
  "typer>=0.15,<1",
  "rich>=13.9,<15",
]

[project.scripts]
kubeops = "kubeops_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["kubeops_cli*"]
